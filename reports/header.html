<script>
document.addEventListener('DOMContentLoaded', function () {

  /* ── 1. Custom Drawer ─────────────────────────────────────────────── */
  var navGroups = [
    {
      label: 'Overview', open: true,
      items: [
        { label: 'Executive Summary', id: 'executive-summary' }
      ]
    },
    {
      label: 'Diagnosis', open: true,
      items: [
        { label: '1 — Dual-Website Crisis', id: 'dual-website-crisis' },
        { label: '4 — Audit Scores', id: 'overall-audit-scores' },
        { label: '5 — Behavioral Forces', id: 'behavioral-force-analysis' }
      ]
    },
    {
      label: 'Revenue', open: true,
      items: [
        { label: '2 — Financial Analysis', id: 'financial-analysis' },
        { label: '3 — Menu Pricing', id: 'menu-price-analysis' },
        { label: '9 — Specials & Anchoring', id: 'specials-price-anchor-analysis' }
      ]
    },
    {
      label: 'Strategy', open: true,
      items: [
        { label: '6 — Competitive Position', id: 'competitive-positioning' },
        { label: '7 — Priority Matrix', id: 'priority-matrix' },
        { label: '10 — 30-Day Roadmap', id: 'day-roadmap' },
        { label: '11 — Score Projection', id: 'score-projection' }
      ]
    },
    {
      label: 'Findings & Copy', open: false,
      items: [
        { label: '8 — Social Proof Gap', id: 'social-proof-gap' },
        { label: '12 — Section Findings', id: 'section-findings' },
        { label: '13 — Copy Rewrites', id: 'copy-rewrites' },
        { label: '14 — Homepage Wireframe', id: 'recommended-homepage-wireframe' },
        { label: '15 — Proof Gaps', id: 'proof-gaps' },
        { label: '16 — The Big Idea', id: 'the-big-idea' }
      ]
    }
  ];

  var chevronSVG = '<svg viewBox="0 0 12 12"><polyline points="2,4 6,8 10,4"/></svg>';
  var chevronLSVG = '<svg viewBox="0 0 12 12"><polyline points="8,2 4,6 8,10"/></svg>';

  var drawer = document.createElement('div');
  drawer.id = 'ez-drawer';
  drawer.innerHTML = '<nav class="ez-drawer-nav" id="ez-nav"></nav>';
  document.body.insertBefore(drawer, document.body.firstChild);

  var nav = document.getElementById('ez-nav');
  var allLinks = [];

  navGroups.forEach(function (group) {
    var groupEl = document.createElement('div');
    groupEl.className = 'ez-nav-group';

    var groupBtn = document.createElement('button');
    groupBtn.className = 'ez-nav-group-btn' + (group.open ? '' : ' collapsed');
    groupBtn.innerHTML = group.label + chevronSVG;

    var itemsEl = document.createElement('div');
    itemsEl.className = 'ez-nav-items' + (group.open ? '' : ' collapsed');

    // Measure height after append for smooth animation
    group.items.forEach(function (item) {
      var a = document.createElement('a');
      a.className = 'ez-nav-link';
      a.textContent = item.label;
      a.setAttribute('data-target', item.id);
      a.href = '#' + item.id;
      a.addEventListener('click', function (e) {
        e.preventDefault();
        var target = document.getElementById(item.id);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
      itemsEl.appendChild(a);
      allLinks.push(a);
    });

    groupBtn.addEventListener('click', function () {
      var isCollapsed = groupBtn.classList.contains('collapsed');
      if (isCollapsed) {
        itemsEl.style.maxHeight = itemsEl.scrollHeight + 'px';
        groupBtn.classList.remove('collapsed');
        itemsEl.classList.remove('collapsed');
        // After transition, set to none so it can flex
        setTimeout(function () { itemsEl.style.maxHeight = 'none'; }, 320);
      } else {
        itemsEl.style.maxHeight = itemsEl.scrollHeight + 'px';
        requestAnimationFrame(function () {
          itemsEl.style.maxHeight = '0';
        });
        groupBtn.classList.add('collapsed');
        itemsEl.classList.add('collapsed');
      }
    });

    // Set initial max-height for open groups
    if (group.open) {
      itemsEl.style.maxHeight = 'none';
    } else {
      itemsEl.style.maxHeight = '0';
    }

    groupEl.appendChild(groupBtn);
    groupEl.appendChild(itemsEl);
    nav.appendChild(groupEl);
  });

  /* Drawer toggle tab */
  var drawerToggle = document.createElement('button');
  drawerToggle.id = 'ez-drawer-toggle';
  drawerToggle.title = 'Toggle navigation';
  drawerToggle.setAttribute('aria-label', 'Toggle navigation');
  drawerToggle.innerHTML = chevronLSVG;
  document.body.appendChild(drawerToggle);

  var drawerOpen = true;
  drawerToggle.addEventListener('click', function () {
    drawerOpen = !drawerOpen;
    document.body.classList.toggle('ez-drawer-closed', !drawerOpen);
  });

  /* Active section tracking */
  var sectionIds = [];
  navGroups.forEach(function (g) { g.items.forEach(function (i) { sectionIds.push(i.id); }); });

  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        var id = entry.target.id;
        allLinks.forEach(function (a) {
          a.classList.toggle('ez-active', a.getAttribute('data-target') === id);
        });
      }
    });
  }, { rootMargin: '-10% 0px -60% 0px', threshold: 0 });

  sectionIds.forEach(function (id) {
    var el = document.getElementById(id);
    if (el) observer.observe(el);
  });

  /* ── 2. Progressive Disclosure ──────────────────────────────────────── */
  // For each level1 section that has multiple level2 sub-sections,
  // keep first sub-section visible, hide the rest behind a toggle.
  var level1Sections = document.querySelectorAll('div.section.level1');

  level1Sections.forEach(function (sec) {
    var subsections = sec.querySelectorAll(':scope > div.section.level2');
    if (subsections.length < 2) return; // nothing to disclose

    var hidden = Array.prototype.slice.call(subsections, 1); // all but first
    var count = hidden.length;

    // Wrap hidden subsections in disclosure container
    var rest = document.createElement('div');
    rest.className = 'ez-disclosure-rest';
    var placeholder = hidden[0];
    sec.insertBefore(rest, placeholder);
    hidden.forEach(function (sub) { rest.appendChild(sub); });

    // Create toggle button
    var toggleBtn = document.createElement('button');
    toggleBtn.className = 'ez-disclosure-toggle';
    toggleBtn.innerHTML =
      '<svg viewBox="0 0 12 12"><polyline points="2,4 6,8 10,4"/></svg>'
      + 'Show <span class="ez-disclosure-count">' + count + '</span> more sub-sections';
    sec.insertBefore(toggleBtn, rest);

    // Animate open
