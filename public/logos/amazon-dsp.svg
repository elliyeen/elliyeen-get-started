<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 285 80" fill="none">
  <!-- "amazon" lowercase bold -->
  <text x="0" y="48" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#111111">amazon</text>
  <!-- Orange smile arc (from under 'a' to under 'n') -->
  <path d="M 6 60 Q 88 80 172 60" stroke="#FF9900" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Arrow tip pointing right -->
  <path d="M 165 54 L 175 61 L 165 67" fill="none" stroke="#FF9900" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- "DSP" in orange -->
  <text x="190" y="48" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#FF9900">DSP</text>
</svg>
